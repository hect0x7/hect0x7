name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run on every push on the master branch and the temporary test branch
  push:
    branches:
    - master
    - star-history

concurrency:
  group: profile-assets-${{ github.repository }}
  cancel-in-progress: true

jobs:
  # Job 1: Snake Animation
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Upload snake artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-assets
          path: dist/*.svg
          if-no-files-found: error
  
  # Job 2: Main Stats (Stats & Top Langs) - Parallel 2x2 Matrix
  generate-main-stats:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        type: [stats, top-langs]
        theme: [light, dark]
    steps:
      - name: Generate ${{ matrix.type }} (${{ matrix.theme }})
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: ${{ matrix.type }}
          # Logic:
          # - Base: username + show_icons=true (for stats) OR layout=compact... (for top-langs)
          # - Theme: append &theme=radical if dark
          options: >-
            username=${{ github.repository_owner }}&${{ matrix.type == 'stats' && 'show_icons=true' || 'layout=compact&langs_count=6&line_height=25' }}${{ matrix.theme == 'dark' && '&theme=radical' || '' }}
          path: ${{ matrix.type }}-${{ matrix.theme == 'dark' && 'dark' || 'light' }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.type }}-${{ matrix.theme }}
          path: ${{ matrix.type }}-${{ matrix.theme == 'dark' && 'dark' || 'light' }}.svg
          if-no-files-found: error

  # Job 3: Repo Pins - Parallel 4x2 Matrix
  generate-pins:
    strategy:
      matrix:
        repo: [JMComic-Crawler-Python, jmcomic-ai, plugin-jm-server, JMComic-APK]
        theme: [light, dark]
    runs-on: ubuntu-latest
    steps:
      - name: Generate repo pin (${{ matrix.repo }}) (${{ matrix.theme }})
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=${{ matrix.repo }}&show_owner=true${{ matrix.theme == 'dark' && '&theme=radical' || '' }}
          path: pin-${{ matrix.repo }}${{ matrix.theme == 'dark' && '-dark' || '' }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload pin artifact
        uses: actions/upload-artifact@v4
        with:
          name: pin-${{ matrix.repo }}-${{ matrix.theme }}
          path: pin-${{ matrix.repo }}${{ matrix.theme == 'dark' && '-dark' || '' }}.svg
          if-no-files-found: error

  # Job 4: Star History
  generate-star-history:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout generator
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore cached star history
        shell: bash
        run: |
          mkdir -p star-history
          if git fetch origin output:refs/remotes/origin/output --depth=1 && \
             git show origin/output:profile/star-history.json > star-history/star-history.json 2>/dev/null; then
            echo "Restored star history cache from output branch"
          else
            printf '{"version":1,"repositories":{}}\n' > star-history/star-history.json
          fi

      - name: Generate star history
        env:
          GITHUB_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: |
          python .github/scripts/generate_star_history.py \
            --config .github/star-history-repositories.json \
            --cache star-history/star-history.json \
            --output star-history/star-history.svg \
            --dark-output star-history/star-history-dark.svg

      - name: Upload star history artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-history-assets
          path: star-history/star-history*
          if-no-files-found: error

  # Job 5: Deploy
  deploy:
    needs: [generate-snake, generate-main-stats, generate-pins, generate-star-history]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout validation scripts
        uses: actions/checkout@v4

      - name: Download snake artifact
        uses: actions/download-artifact@v4
        with:
          name: snake-assets
          path: dist

      - name: Download main stats artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: main-*
          path: dist/profile
          merge-multiple: true

      - name: Download pin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pin-*
          path: dist/profile
          merge-multiple: true

      - name: Download star history artifact
        uses: actions/download-artifact@v4
        with:
          name: star-history-assets
          path: dist/profile

      - name: Validate output asset manifest
        run: bash tests/validate-output-assets.sh dist

      - name: Deploy all profile assets
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
