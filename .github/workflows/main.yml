name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run on every push on the master branch and the temporary test branch
  push:
    branches:
    - master
    - star-history

concurrency:
  group: profile-assets-${{ github.repository }}
  cancel-in-progress: true

jobs:
  # Job 1: Snake Animation
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Upload snake artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-assets
          path: dist/*.svg
          if-no-files-found: error
  
  # Job 2: Main Stats (Stats & Top Langs) - Parallel 2x2 Matrix
  generate-main-stats:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        type: [stats, top-langs]
        theme: [light, dark]
    steps:
      - name: Generate ${{ matrix.type }} (${{ matrix.theme }})
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: ${{ matrix.type }}
          # Logic:
          # - Base: username + show_icons=true (for stats) OR layout=compact... (for top-langs)
          # - Theme: append &theme=radical if dark
          options: >-
            username=${{ github.repository_owner }}&${{ matrix.type == 'stats' && 'show_icons=true' || 'layout=compact&langs_count=6&line_height=25' }}${{ matrix.theme == 'dark' && '&theme=radical' || '' }}
          path: ${{ matrix.type }}-${{ matrix.theme == 'dark' && 'dark' || 'light' }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.type }}-${{ matrix.theme }}
          path: ${{ matrix.type }}-${{ matrix.theme == 'dark' && 'dark' || 'light' }}.svg
          if-no-files-found: error

  # Job 3: Repo Pins - Parallel 4x2 Matrix
  generate-pins:
    strategy:
      matrix:
        repo: [JMComic-Crawler-Python, jmcomic-ai, plugin-jm-server, JMComic-APK]
        theme: [light, dark]
    runs-on: ubuntu-latest
    steps:
      - name: Generate repo pin (${{ matrix.repo }}) (${{ matrix.theme }})
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=${{ matrix.repo }}&show_owner=true${{ matrix.theme == 'dark' && '&theme=radical' || '' }}
          path: pin-${{ matrix.repo }}${{ matrix.theme == 'dark' && '-dark' || '' }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload pin artifact
        uses: actions/upload-artifact@v4
        with:
          name: pin-${{ matrix.repo }}-${{ matrix.theme }}
          path: pin-${{ matrix.repo }}${{ matrix.theme == 'dark' && '-dark' || '' }}.svg
          if-no-files-found: error

  # Job 4: Star History
  generate-star-history:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Checkout official Star History
        uses: actions/checkout@v4
        with:
          repository: star-history/star-history
          ref: bcddc9d532b10bac7e0187a741288bf9cab17616
          path: star-history-upstream

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install official Star History backend
        run: |
          git -C star-history-upstream apply "$GITHUB_WORKSPACE/.github/patches/star-history-token-test-repo.patch"
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --dir star-history-upstream install --frozen-lockfile
          pnpm --dir star-history-upstream/backend install --frozen-lockfile

      - name: Generate official Star History SVGs
        env:
          STAR_HISTORY_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
          TOKEN_TEST_REPO: hect0x7/JMComic-Crawler-Python
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p star-history
          token_file="$RUNNER_TEMP/star-history-token.env"
          server_log="$RUNNER_TEMP/star-history-server.log"
          printf '%s\n' "$STAR_HISTORY_TOKEN" > "$token_file"
          chmod 600 "$token_file"

          ENVPATH="$token_file" TOKEN_TEST_REPO="$TOKEN_TEST_REPO" \
            pnpm --dir star-history-upstream/backend dev > "$server_log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat "$server_log"
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null || {
            cat "$server_log"
            exit 1
          }

          repositories=$(jq -r 'join(",")' .github/star-history-repositories.json)
          curl --fail --silent --show-error --location --get \
            --data-urlencode "repos=$repositories" \
            --data-urlencode "type=Date" \
            --data-urlencode "legend=top-left" \
            http://127.0.0.1:8080/svg \
            --output star-history/star-history.svg
          curl --fail --silent --show-error --location --get \
            --data-urlencode "repos=$repositories" \
            --data-urlencode "type=Date" \
            --data-urlencode "theme=dark" \
            --data-urlencode "legend=top-left" \
            http://127.0.0.1:8080/svg \
            --output star-history/star-history-dark.svg

          grep -q '<svg' star-history/star-history.svg
          grep -q '<svg' star-history/star-history-dark.svg

      - name: Upload star history artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-history-assets
          path: star-history/*.svg
          if-no-files-found: error

  # Job 5: Deploy
  deploy:
    needs: [generate-snake, generate-main-stats, generate-pins, generate-star-history]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout validation scripts
        uses: actions/checkout@v4

      - name: Download snake artifact
        uses: actions/download-artifact@v4
        with:
          name: snake-assets
          path: dist

      - name: Download main stats artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: main-*
          path: dist/profile
          merge-multiple: true

      - name: Download pin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pin-*
          path: dist/profile
          merge-multiple: true

      - name: Download star history artifact
        uses: actions/download-artifact@v4
        with:
          name: star-history-assets
          path: dist/profile

      - name: Validate output asset manifest
        run: bash tests/validate-output-assets.sh dist

      - name: Deploy all profile assets
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
